name: Automerge

on:
  workflow_run:
    workflows: ["Homebrew Bump"]
    types:
      - completed
  workflow_dispatch:

jobs:
  dispatch-tests:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Dispatch CI for Bump PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Find open PRs by bump users
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 50
            });

            for (const pr of pulls) {
              const isBumpBot = ['github-actions[bot]', 'github-actions', 'BrewTestBot', 'lambdaclan', 'app/github-actions'].includes(pr.user.login);
              const isBumpBranch = pr.head.ref.startsWith('bump-');

              if ((isBumpBot || isBumpBranch) && !pr.draft) {
                console.log(`Dispatching Bump CI for PR #${pr.number}`);

                await github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id: 'bump-ci.yml',
                  ref: 'main',
                  inputs: {
                    pr_number: pr.number.toString()
                  }
                });
              }
            }
