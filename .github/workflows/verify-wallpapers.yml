name: Verify Wallpaper Cask Checksums

on:
  pull_request:
    paths:
      - "Casks/*wallpapers*.rb"
      - "scripts/verify-wallpapers.py"
      - ".github/workflows/verify-wallpapers.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Verify wallpaper cask checksums
        run: python3 scripts/verify-wallpapers.py
